services:
  # Backend API
  - type: web
    name: sales-agent-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: sales-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: sales-agent-redis
          property: connectionString

  # Background Worker
  - type: worker
    name: sales-agent-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sales-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: sales-agent-redis
          property: connectionString

databases:
  - name: sales-agent-db
    databaseName: sales_agent
    plan: starter
    region: oregon

# Redis for job queues
services:
  - type: redis
    name: sales-agent-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
